<!DOCTYPE html>
<html>
<head>
  <title>ApontaAí 🚀</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
      background: #0f172a;
      color: white;
    }

    /* Área do slide */
    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .preview {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

    /* Menu lateral */
    .sidebar {
        width: 250px;
        background: #020617;
        padding: 20px;
        border-right: 2px solid #1e293b;

        position: fixed;
        left: 0;
        top: 0;
        height: 100%;

        transform: translateX(-100%);
        transition: transform 0.3s ease;

        display: flex;
        flex-direction: column;
        gap: 15px;
        justify-content: center;   /* CENTRALIZA NA VERTICAL */
        align-items: center;       /* CENTRALIZA NA HORIZONTAL */
    }

    .sidebar.open {
            transform: translateX(0);
    }

    .feature {
      padding: 12px;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      transition: 0.2s;
    }

    .feature:hover {
      background: #38bdf8;
      color: black;
    }

    .active {
      background: #22c55e !important;
      color: black;
    }

    input {
      display: none;
    }

    .upload-btn {
      background: #38bdf8;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
    }
    .menu-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 1000;

        width: 50px;
        height: 50px;

        border: none;
        border-radius: 50%;

        background: #38bdf8;
        color: white;
        font-size: 22px;

        cursor: pointer;

        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        transition: all 0.2s ease
    }
    .slide-container {
        width: 80%;
        aspect-ratio: 16 / 9;

        background: black;
        display: flex;
        justify-content: center;
        align-items: center;

        border-radius: 12px;
        overflow: hidden;

        box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

    .slide {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }


    /* Hover */
    .menu-btn:hover {
        background: #0ea5e9;
        transform: scale(1.1);
    }

    /* Clique */
    .menu-btn:active {
        transform: scale(0.95);
    }
  </style>
</head>

<body>

<button class="menu-btn" onclick="toggleMenu()">
  ☰
</button>
<!-- Área principal -->
<div class="main">
    <div class="slide-container">
  <img id="preview" class="preview">
  </div>
</div>

<!-- Menu lateral -->
<div class="sidebar">

  <label class="upload-btn">
    Upload Slide
    <input type="file" id="fileInput" accept="image/*">
  </label>

  <div class="feature" onclick="selectFeature(this, 'laser')">🔴 Laser</div>
  <div class="feature" onclick="selectFeature(this, 'draw')">✏️ Desenhar</div>
  <div class="feature" onclick="selectFeature(this, 'next')">➡️ Próximo</div>
  <div class="feature" onclick="selectFeature(this, 'prev')">⬅️ Voltar</div>

</div>

<script>
  const input = document.getElementById('fileInput');
  const preview = document.getElementById('preview');

  let currentFeature = null;


  const sidebar = document.querySelector('.sidebar');

    function toggleMenu() {
        sidebar.classList.toggle('open');
  }

  input.addEventListener('change', () => {
    const file = input.files[0];
    if (file) {
      preview.src = URL.createObjectURL(file);
    }
  });

  function selectFeature(element, feature) {
    document.querySelectorAll('.feature').forEach(f => f.classList.remove('active'));

    element.classList.add('active');
    currentFeature = feature;

    console.log("Feature ativa:", feature);
  }
</script>

</body>
</html>
