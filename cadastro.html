<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="css/cadastro.css">
  <title>ApontaAí — Entrar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <header class="topbar">
    <a href="index2.html" class="logo"><span class="logo-dot"></span> ApontaAí</a>
  </header>

  <div class="card">
    <div>
      <div class="card-title">Bem-vindo de volta</div>
      <div class="card-sub" style="margin-top:4px">Faça login para continuar</div>
    </div>

    <div class="field">
      <label>E-mail</label>
      <input type="email" id="emailInput" placeholder="seu@email.com"/>
    </div>

    <div class="field">
      <label>Senha</label>
      <div class="input-wrap">
        <input type="password" placeholder="••••••••" id="senhaInput"/>
        <button class="eye-btn" id="olhoBtn" type="button"></button>
      </div>
    </div>

    <div class="forgot"><a href="#">Esqueci minha senha</a></div>

    <div id="msgErro" style="color:#e53e3e;font-size:12px;min-height:16px;"></div>

    <button class="btn-primary" id="btnEntrar">Entrar</button>

    <div class="divider"><span>ou</span></div>

    <div class="footer-link">Não tem uma conta? <a href="CC.html">Criar conta</a></div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/cadastro.js"></script>

</body>
</html>
